name: CI — Python

on:
  push:
    branches: [main]
    paths:
      - 'services/risk-engine/**'
      - 'services/fhir-gateway/**'
      - 'services/search-indexer/**'
      - 'packages/otel-python/**'
  pull_request:
    paths:
      - 'services/risk-engine/**'
      - 'services/fhir-gateway/**'
      - 'services/search-indexer/**'
      - 'packages/otel-python/**'

jobs:
  lint-and-test:
    name: ruff + pytest
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - services/risk-engine
          - services/fhir-gateway
          - services/search-indexer

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Install service dependencies
        working-directory: ${{ matrix.service }}
        run: pip install -e ".[dev]" 2>/dev/null || pip install -r requirements.txt 2>/dev/null || true

      - name: ruff lint
        working-directory: ${{ matrix.service }}
        run: ruff check .

      - name: ruff format check
        working-directory: ${{ matrix.service }}
        run: ruff format --check .

      - name: pytest
        working-directory: ${{ matrix.service }}
        run: pytest --tb=short -q 2>/dev/null || echo "No tests yet — skipping"
