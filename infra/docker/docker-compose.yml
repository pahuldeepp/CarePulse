services:

  # ── Postgres 16 ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: carepack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: carepack
      POSTGRES_PASSWORD: carepack
      POSTGRES_DB: carepack
    # wal_level=logical required for Debezium CDC (pgoutput plugin needs WAL replication)
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c pg_stat_statements.max=10000
        -c track_activity_query_size=2048
        -c wal_level=logical
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carepack"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── PgBouncer (transaction-mode pool in front of Postgres) ───────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: carepack-pgbouncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: carepack
      DB_PASSWORD: carepack
      DB_NAME: carepack
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: md5
    ports:
      - "5433:5432"   # services connect on 5433; DDL/migrations use 5432 directly

  # ── Kafka (KRaft — no ZooKeeper) ─────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: carepack-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Two listener entries: PLAINTEXT for inter-container traffic (hostname),
      # EXTERNAL for host-machine clients (localhost). Debezium Connect uses
      # KAFKA_BOOTSTRAP=kafka:9092 (internal) so it doesn't hit the NAT issue.
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg  # valid 22-char base64 KRaft UUID
    ports:
      - "9092:9092"   # inter-container (services use kafka:9092)
      - "9093:9093"   # host-to-container (dev tools use localhost:9093)
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: carepack-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── RabbitMQ 3 (with management UI) ──────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: carepack-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: carepack
      RABBITMQ_DEFAULT_PASS: carepack
      RABBITMQ_DEFAULT_VHOST: carepack
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI → http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── Debezium Kafka Connect ────────────────────────────────────────────────────
  # Tails Postgres WAL via pgoutput, routes outbox_events → cdc.outbox.events
  # Port 8088 (not 8083) to avoid collision with saga-orchestrator default port
  connect:
    image: quay.io/debezium/connect:2.7
    container_name: carepack-connect
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092   # internal listener — containers can reach this
      GROUP_ID: carepack-connect-cluster
      CONFIG_STORAGE_TOPIC: carepack.connect.configs
      OFFSET_STORAGE_TOPIC: carepack.connect.offsets
      STATUS_STORAGE_TOPIC: carepack.connect.status
      CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      STATUS_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      CONNECT_PLUGIN_PATH: /kafka/connect
      # Override the REST port so it does not collide with saga-orchestrator (8083)
      REST_PORT: "8088"
    ports:
      - "8088:8088"   # Kafka Connect REST API — curl http://localhost:8088/connectors
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/connectors || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── OpenSearch (search-indexer target) ───────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: carepack-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: CarePulse_Admin1!
      plugins.security.disabled: "true"   # dev-only; enable TLS in prod
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── postgres-exporter — exposes pg_stat_statements to Prometheus ─────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: carepack-postgres-exporter
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://carepack:carepack@postgres:5432/carepack?sslmode=disable"
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
    ports:
      - "9187:9187"

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: carepack-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - postgres-exporter

  # ── Grafana ───────────────────────────────────────────────────────────────────
  # Dashboard: http://localhost:3000  admin / carepack
  grafana:
    image: grafana/grafana:10.4.0
    container_name: carepack-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: carepack
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-clock-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - postgres

  # ── OpenSearch (S6) ───────────────────────────────────────────────────────────
  # search-indexer bulk-indexes patient + alert events here.
  # Security plugin disabled for local dev — enable for production.
  opensearch:
    image: opensearchproject/opensearch:2.14.0
    container_name: carepack-opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  kafka_data:
  redis_data:
  rabbitmq_data:
  opensearch_data:
  prometheus_data:
  grafana_data:
  opensearch_data:
