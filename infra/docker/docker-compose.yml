services:

  # ── Postgres 16 ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: carepack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: carepack
      POSTGRES_PASSWORD: carepack
      POSTGRES_DB: carepack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carepack"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── PgBouncer (transaction-mode pool in front of Postgres) ───────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: carepack-pgbouncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: carepack
      DB_PASSWORD: carepack
      DB_NAME: carepack
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: md5
    ports:
      - "5433:5432"   # services connect on 5433; DDL/migrations use 5432 directly

  # ── Kafka (KRaft — no ZooKeeper) ─────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: carepack-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg  # valid 22-char base64 KRaft UUID
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: carepack-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── RabbitMQ 3 (with management UI) ──────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: carepack-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: carepack
      RABBITMQ_DEFAULT_PASS: carepack
      RABBITMQ_DEFAULT_VHOST: carepack
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI → http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

volumes:
  postgres_data:
  kafka_data:
  redis_data:
  rabbitmq_data:
