# SonarCloud project configuration for CarePulse
# Docs: https://docs.sonarsource.com/sonarcloud/

sonar.projectKey=pahuldeepp_CarePulse
sonar.organization=pahuldeepp

sonar.projectName=CarePulse
sonar.projectVersion=0.1.0

# ── Source paths ──────────────────────────────────────────────────────────────
sonar.sources=services,packages
sonar.tests=services

# ── Exclusions ────────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/__pycache__/**,\
  **/*.pb.go,\
  **/vendor/**,\
  **/go.sum,\
  **/*.min.js,\
  **/CarePulse_Sprint_Plan_v1.pdf

sonar.test.inclusions=\
  **/*_test.go,\
  **/*.test.ts,\
  **/*.test.js,\
  **/*.spec.ts,\
  **/test_*.py,\
  **/*_test.py

# ── Coverage exclusions ───────────────────────────────────────────────────────
# Entry/bootstrap files are excluded from coverage — they wire dependencies
# together and require full integration tests to exercise meaningfully.
sonar.coverage.exclusions=\
  **/index.js,\
  **/main.ts,\
  **/main.go,\
  **/app.module.ts

# ── Language settings ─────────────────────────────────────────────────────────

# Go
sonar.go.coverage.reportPaths=coverage/go/coverage.out

# JavaScript / TypeScript
sonar.javascript.lcov.reportPaths=coverage/node/lcov.info
sonar.typescript.lcov.reportPaths=coverage/node/lcov.info

# Python
sonar.python.coverage.reportPaths=coverage/python/risk-engine.xml,coverage/python/fhir-gateway.xml,coverage/python/search-indexer.xml
sonar.python.version=3.12

# ── Quality gate ──────────────────────────────────────────────────────────────
# Sonar Way (default) — blocks PR merge if:
#   - new bugs > 0
#   - new vulnerabilities > 0
#   - new security hotspots reviewed < 100%
#   - new coverage < 80%
#   - new duplication > 3%
